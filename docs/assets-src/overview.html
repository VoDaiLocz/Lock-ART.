<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>AuraLock README Banner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        background: #ffffff;
        font-family: "IBM Plex Sans", sans-serif;
      }

      .banner {
        width: 1120px;
        height: 270px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 30px;
        background: #ffffff;
      }

      .mark {
        width: 240px;
        height: 240px;
        display: grid;
        place-items: center;
      }

      .divider {
        width: 2px;
        height: 132px;
        background: linear-gradient(
          180deg,
          rgba(148, 163, 184, 0.16),
          rgba(148, 163, 184, 0.9),
          rgba(148, 163, 184, 0.16)
        );
      }

      .wordmark {
        font-family: "Space Grotesk", sans-serif;
        font-size: 104px;
        line-height: 0.95;
        letter-spacing: -0.075em;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <main class="banner">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 260 260" width="236" height="236" role="img">
          <defs>
            <linearGradient id="ring" x1="0%" x2="100%" y1="0%" y2="100%">
              <stop offset="0%" stop-color="#8dc5ff" />
              <stop offset="55%" stop-color="#4c78c8" />
              <stop offset="100%" stop-color="#22497e" />
            </linearGradient>
            <linearGradient id="lockFill" x1="0%" x2="100%" y1="0%" y2="100%">
              <stop offset="0%" stop-color="#7dd3fc" />
              <stop offset="100%" stop-color="#0f766e" />
            </linearGradient>
          </defs>
          <ellipse
            cx="148"
            cy="128"
            rx="84"
            ry="94"
            fill="#eef5ff"
            stroke="url(#ring)"
            stroke-width="8"
          ></ellipse>
          <ellipse
            cx="148"
            cy="128"
            rx="67"
            ry="76"
            fill="none"
            stroke="#95bfe7"
            stroke-width="4"
            opacity="0.9"
          ></ellipse>
          <path
            d="M90 176c19-26 46-42 77-45 29-3 56 5 80 20-17 24-41 40-69 47-30 6-61-1-88-22Z"
            fill="url(#ring)"
            opacity="0.22"
          ></path>
          <path
            d="M63 90c-22 2-42 12-56 30 16-2 30 0 43 6-18 3-31 12-41 28 23-2 41 4 57 18 12 10 28 14 45 13-15-13-23-29-23-49 0-18 7-34 21-46-17 1-32 1-46 0Z"
            fill="url(#ring)"
          ></path>
          <path
            d="M182 78h-22V65c0-18-14-32-32-32s-32 14-32 32v13H74c-8 0-14 6-14 14v50c0 8 6 14 14 14h108c8 0 14-6 14-14V92c0-8-6-14-14-14Zm-65-13c0-6 5-11 11-11s11 5 11 11v13h-22V65Zm11 49c8 0 14 6 14 14 0 5-2 9-5 11v15h-18v-15c-3-2-5-6-5-11 0-8 6-14 14-14Z"
            fill="url(#lockFill)"
            opacity="0.92"
          ></path>
        </svg>
      </div>
      <div class="divider"></div>
      <div class="wordmark">AuraLock</div>
    </main>
  </body>
</html>
